[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
evm_version = "cancun"
fs_permissions = [{access = "read-write", path = "./deployments"}]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 512

[profile.default.invariant]
runs = 128
depth = 64
fail_on_revert = false

[profile.ci.fuzz]
runs = 2048

# GIWA network endpoints.
# Source: https://docs.giwa.io/get-started/connect-to-giwa.md
[rpc_endpoints]
giwa_sepolia = "${GIWA_SEPOLIA_RPC_URL}"
giwa_sepolia_flashblocks = "${GIWA_SEPOLIA_FLASHBLOCKS_RPC_URL}"

# Contract verification via Blockscout.
# Source: https://docs.giwa.io/get-started/smart-contract/develop/foundry.md
[etherscan]
giwa_sepolia = {key = "${BLOCKSCOUT_API_KEY}", url = "https://sepolia-explorer.giwa.io/api", chain = 91342}

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
